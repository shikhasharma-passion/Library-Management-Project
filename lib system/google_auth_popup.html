<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #202124;
        }
        .container {
            width: 450px;
            padding: 40px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            text-align: center;
        }
        .google-logo {
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
            color: #202124;
        }
        .subtitle {
            font-size: 16px;
            color: #202124;
            margin-bottom: 30px;
        }
        .input-wrapper {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #1a73e8;
            border-width: 2px;
            padding: 15px; /* adjust for border width */
        }
        label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #5f6368;
            background: #ffffff;
            padding: 0 4px;
            transition: 0.2s ease all;
            pointer-events: none;
        }
        input:focus ~ label, input:not(:placeholder-shown) ~ label {
            top: 0;
            font-size: 12px;
            color: #1a73e8;
        }
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 35px;
        }
        .create-account {
            color: #1a73e8;
            font-weight: 500;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        .create-account:hover {
            color: #1557b0;
        }
        .next-btn {
            background: #1a73e8;
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .next-btn:hover {
            background: #1557b0;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }
        .account-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 10px;
            border-bottom: 1px solid #dadce0;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
        }
        .account-item:hover {
            background: #f1f3f4;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1a73e8;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 14px;
        }
        @media (max-width: 450px) {
            .container {
                border: none;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Official Google Logo Vector -->
        <svg class="google-logo" viewBox="0 0 24 24" width="48" height="48" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>

        <div id="step-choose-account">
            <h1>Choose an account</h1>
            <p class="subtitle">to continue to ZHI Library</p>
            
            <div style="border-top: 1px solid #dadce0; margin-bottom: 25px;">
                <div class="account-item" onclick="loginWith('Karan Singh', 'karan.singh@gmail.com', 'K')">
                    <div class="avatar" style="background:#3b82f6;">K</div>
                    <div>
                        <div style="font-weight: 500; font-size: 14px;">Karan Singh</div>
                        <div style="font-size: 12px; color: #5f6368;">karan.singh@gmail.com</div>
                    </div>
                </div>
                <div class="account-item" onclick="loginWith('Rohan Kumar', 'rohan.kumar@gmail.com', 'R')">
                    <div class="avatar" style="background:#10b981;">R</div>
                    <div>
                        <div style="font-weight: 500; font-size: 14px;">Rohan Kumar</div>
                        <div style="font-size: 12px; color: #5f6368;">rohan.kumar@gmail.com</div>
                    </div>
                </div>
                <div class="account-item" onclick="showEmailForm()">
                    <div class="avatar" style="background:#e8eaed; color:#5f6368;">+</div>
                    <div>
                        <div style="font-weight: 500; font-size: 14px; color: #1a73e8;">Use another account</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="step-email-form" style="display: none;">
            <h1>Sign in</h1>
            <p class="subtitle">to continue to ZHI Library</p>

            <div class="input-wrapper">
                <input type="email" id="emailInput" placeholder=" " required>
                <label for="emailInput">Email or phone</label>
            </div>

            <div class="input-wrapper" id="passwordWrapper" style="margin-top: 15px;">
                <input type="password" id="passwordInput" placeholder=" " required>
                <label for="passwordInput">Enter your password</label>
            </div>

            <div class="actions">
                <span class="create-account" onclick="showAccountsList()">Back</span>
                <button class="next-btn" onclick="submitCustomEmail()">Next</button>
            </div>
        </div>
    </div>

    <script>
        function loginWith(name, email) {
            if (window.opener) {
                // Post details back to parent window
                window.opener.postMessage({
                    type: 'GOOGLE_LOGIN_SUCCESS',
                    name: name,
                    email: email
                }, window.location.origin);
                window.close();
            }
        }

        function showEmailForm() {
            document.getElementById('step-choose-account').style.display = 'none';
            document.getElementById('step-email-form').style.display = 'block';
            document.getElementById('emailInput').focus();
        }

        function showAccountsList() {
            document.getElementById('step-choose-account').style.display = 'block';
            document.getElementById('step-email-form').style.display = 'none';
        }

        function submitCustomEmail() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email || !email.includes('@') || !email.includes('.')) {
                alert('Please enter a valid Google Account email.');
                return;
            }

            const prefix = email.split('@')[0].replace(/[^a-zA-Z]/g, ' ').trim();
            const formattedName = prefix.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

            loginWith(formattedName || "Google Student", email);
        }
    </script>
</body>
</html>

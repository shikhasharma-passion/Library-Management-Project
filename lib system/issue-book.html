<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Book</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" style="display:flex; flex-direction:column; justify-content:space-between; height:100vh; padding: 30px 20px 20px 20px;">
        <div style="flex:1;">
            <div class="logo" style="cursor: pointer;" onclick="location.href='index.html'">
                <img src="images/Dr_Zakir_Husain_Institute_Patna_Logo.avif" alt="ZHI Logo">
                <h2>ZHI Admin</h2>
            </div>
            <ul>
                <li><a href="dashboard.html">🏠 Dashboard</a></li>
                <li><a href="books.html">📚 Books Inventory</a></li>
                <li><a href="students.html">👥 Student List</a></li>
                <li><a href="issue-book.html" class="active">📖 Issue Book</a></li>
                <li><a href="logout.html">🚪 Logout</a></li>
            </ul>
        </div>
        <div class="sidebar-profile" style="margin-top:auto; padding-top:20px; border-top:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:12px;">
            <div style="width:36px; height:36px; border-radius:50%; background:var(--accent-color); color:#0f172a; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;">AD</div>
            <div style="display:flex; flex-direction:column; overflow:hidden;">
                <span style="font-size:13px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Admin User</span>
                <span style="font-size:11px; color:rgba(255,255,255,0.5);">System Manager</span>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- TOPBAR -->
        <div class="topbar">
            <h1>Issue Book Management</h1>
            <div class="profile-section">
                <button id="darkModeBtn">
                    🌙 Mode Toggle
                </button>
                <div class="profile">
                    Welcome, Admin
                </div>
            </div>
        </div>

        <!-- Issue Form -->
        <div class="table-section" style="margin-bottom: 30px;">
            <h2>Issue New Book</h2>
            <form id="issueForm">
                <div class="form-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                    <input type="text" id="issueStudent" placeholder="Student Name" required>
                    <input type="text" id="issueStudentId" placeholder="Student ID (e.g. STU-2026-101)" required style="padding: 14px 16px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--input-bg); color: var(--text-color); outline: none;">
                    <input type="text" id="issueBook" placeholder="Book Title" required>
                    <input type="text" id="issueAccessionNo" placeholder="Book Accession Number" required style="padding: 14px 16px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--input-bg); color: var(--text-color); outline: none;">
                    <input type="date" id="issueDate" title="Issue Date" required>
                    <input type="date" id="returnDate" title="Return Deadline" required>
                    <input type="text" id="issueRemarks" placeholder="Remarks (e.g. Good condition)" required style="padding: 14px 16px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--input-bg); color: var(--text-color); outline: none; grid-column: 1/-1;">
                    <button type="submit" style="grid-column: 1/-1; padding: 14px; margin-top: 10px;">Issue Book</button>
                </div>
            </form>
        </div>

        <!-- RECORDS -->
        <div class="table-section">
            <h2>Issued Records</h2>
            <div id="issueList" class="book-grid">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <script src="js/api-resolver.js"></script>
    <script src="js/issue.js"></script>
</body>

</html>

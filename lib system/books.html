<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Management</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" style="display:flex; flex-direction:column; justify-content:space-between; height:100vh; padding: 30px 20px 20px 20px;">
        <div style="flex:1;">
            <div class="logo" style="cursor: pointer;" onclick="location.href='index.html'">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-color);">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                <h2 style="font-size:18px;">SmartLib Admin</h2>
            </div>
            <ul>
                <li><a href="dashboard.html">🏠 Dashboard</a></li>
                <li><a href="books.html" class="active">📚 Books Inventory</a></li>
                <li><a href="students.html">👨‍🎓 Student List</a></li>
                <li><a href="issue-book.html">📖 Issue Book</a></li>
                <li><a href="logout.html">🚪 Logout</a></li>
            </ul>
        </div>
        <div class="sidebar-profile" style="margin-top:auto; padding-top:20px; border-top:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:12px;">
            <div style="width:36px; height:36px; border-radius:50%; background:var(--accent-color); color:#0f172a; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;">AD</div>
            <div style="display:flex; flex-direction:column; overflow:hidden;">
                <span style="font-size:13px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Admin User</span>
                <span style="font-size:11px; color:rgba(255,255,255,0.5);">System Manager</span>
            </div>
        </div>
    </div>

    
    <div class="main-content">
       
        <div class="topbar">
            <h1>Books Management</h1>
            <div class="profile-section">
                <button id="darkModeBtn">
                    🌙 Mode Toggle
                </button>
                <div class="profile">
                    Welcome, Admin
                </div>
            </div>
        </div>

       
        <div class="table-section">
            <h2>Add New Book</h2>
            <form id="bookForm">
                <div class="form-grid">
                    <input type="text" id="bookName" placeholder="Book Title" required>
                    <input type="text" id="authorName" placeholder="Author Name" required>
                    <select id="bookCategory" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="BCA">BCA</option>
                        <option value="BBA">BBA</option>
                        <option value="MCA">MCA</option>
                        <option value="MBA">MBA</option>
                        <option value="Programming">Programming</option>
                        <option value="Self Improvement">Self Improvement</option>
                        <option value="Psychology">Psychology</option>
                        <option value="Encyclopedia">Encyclopedia</option>
                        <option value="Story books">Story books</option>
                        <option value="Magazine">Magazine</option>
                    </select>
                    <button type="submit">Add Book</button>
                </div>
            </form>
        </div>

        
        <div class="table-section">
            <h2>Search Catalog</h2>
            <input type="text" id="searchInput" placeholder="Search by book title, author, category or status...">
        </div>

       
        <div class="table-section">
            <h2>All Books</h2>
            <div id="bookList" class="book-grid">
                
            </div>
        </div>
    </div>

    <script src="js/books.js"></script>
</body>

</html>

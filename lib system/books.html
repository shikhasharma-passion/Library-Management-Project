<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Management</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" style="display:flex; flex-direction:column; justify-content:space-between; height:100vh; padding: 30px 20px 20px 20px;">
        <div style="flex:1;">
            <div class="logo" style="cursor: pointer;" onclick="location.href='index.html'">
                <img src="images/Dr_Zakir_Husain_Institute_Patna_Logo.avif" alt="ZHI Logo">
                <h2>ZHI Admin</h2>
            </div>
            <ul>
                <li><a href="dashboard.html">🏠 Dashboard</a></li>
                <li><a href="books.html" class="active">📚 Books Inventory</a></li>
                <li><a href="students.html">👥 Student List</a></li>
                <li><a href="issue-book.html">📖 Issue Book</a></li>
                <li><a href="logout.html">🚪 Logout</a></li>
            </ul>
        </div>
        <div class="sidebar-profile" style="margin-top:auto; padding-top:20px; border-top:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:12px;">
            <div style="width:36px; height:36px; border-radius:50%; background:var(--accent-color); color:#0f172a; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;">AD</div>
            <div style="display:flex; flex-direction:column; overflow:hidden;">
                <span style="font-size:13px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Admin User</span>
                <span style="font-size:11px; color:rgba(255,255,255,0.5);">System Manager</span>
            </div>
        </div>
    </div>

    
    <div class="main-content">
       
        <div class="topbar">
            <h1>Books Management</h1>
            <div class="profile-section">
                <button id="darkModeBtn">
                    🌙 Mode Toggle
                </button>
                <div class="profile">
                    Welcome, Admin
                </div>
            </div>
        </div>

       
        <div class="table-section">
            <h2>Add New Book Copy</h2>
            <form id="bookForm">
                <div class="form-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                    <input type="text" id="bookName" placeholder="Book Title" required>
                    <input type="text" id="authorName" placeholder="Author Name" required>
                    <input type="text" id="subjectCode" placeholder="Subject Code (e.g. BCA-101)" required>
                    <input type="text" id="isbn" placeholder="ISBN Number" required>
                    <input type="text" id="publisher" placeholder="Publisher" required>
                    <input type="text" id="edition" placeholder="Edition (e.g. 1st Edition)" required>
                    <input type="text" id="language" placeholder="Language (e.g. English)" required>
                    <input type="text" id="accessionNo" placeholder="Accession Number (e.g. ACC-20001)" required>
                    <input type="text" id="rackNo" placeholder="Rack Location (e.g. Rack A)" required>
                    <input type="text" id="shelfNo" placeholder="Shelf Number (e.g. Shelf 1)" required>
                    <select id="bookCategory" required style="padding: 14px 16px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--input-bg); color: var(--text-color); outline: none;">
                        <option value="" disabled selected>Select Course Category</option>
                        <option value="BCA">BCA</option>
                        <option value="BBA">BBA</option>
                        <option value="MCA">MCA</option>
                        <option value="MBA">MBA</option>
                        <option value="Competitive">Competitive</option>
                    </select>
                    <select id="bookSemester" required style="padding: 14px 16px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--input-bg); color: var(--text-color); outline: none;">
                        <option value="" disabled selected>Select Semester</option>
                        <option value="Semester 1">Semester 1</option>
                        <option value="Semester 2">Semester 2</option>
                        <option value="Semester 3">Semester 3</option>
                        <option value="Semester 4">Semester 4</option>
                        <option value="Semester 5">Semester 5</option>
                        <option value="Semester 6">Semester 6</option>
                        <option value="N/A">N/A (Non-Sem)</option>
                    </select>
                    <button type="submit" style="grid-column: 1/-1; padding: 14px; margin-top: 10px;">Add Book to Inventory</button>
                </div>
            </form>
        </div>

        
        <div class="table-section">
            <h2>Search Catalog</h2>
            <input type="text" id="searchInput" placeholder="Search by book title, author, category or status...">
        </div>

       
        <div class="table-section">
            <h2>All Books</h2>
            <div id="bookList" class="book-grid">
                
            </div>
        </div>
    </div>

    <script src="js/api-resolver.js"></script>
    <script src="js/books.js"></script>
</body>
</html>

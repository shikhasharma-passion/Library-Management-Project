<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart E-Reader | Reading Pad</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --reader-bg: #f9fbfd;
            --reader-text: #1a202c;
            --reader-sidebar-bg: #0f172a;
            --reader-sidebar-text: #f8fafc;
            --reader-accent: #d97706;
            --reader-border: #e2e8f0;
            --reader-pad-bg: #ffffff;
            --reader-font-family: 'Lora', serif;
            --reader-font-size: 18px;
            --transition: all 0.25s ease;
        }

        /* Full Night Mode for reader */
        body.night-mode-active {
            --reader-bg: #090d16;
            --reader-text: #e2e8f0;
            --reader-sidebar-bg: #030712;
            --reader-sidebar-text: #f8fafc;
            --reader-border: #1e293b;
            --reader-pad-bg: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--reader-bg);
            color: var(--reader-text);
            min-height: 100vh;
            display: flex;
            transition: var(--transition);
            overflow: hidden;
        }

        /* SIDEBAR (TOC) */
        .reader-sidebar {
            width: 320px;
            background: var(--reader-sidebar-bg);
            color: var(--reader-sidebar-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--reader-border);
            z-index: 10;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .logo-area svg {
            color: var(--reader-accent);
        }
        .logo-area h2 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .book-details h3 {
            font-size: 17px;
            font-weight: 600;
            color: var(--reader-accent);
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .book-details p {
            font-size: 13px;
            opacity: 0.7;
        }

        .toc-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10px;
        }
        .toc-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            padding-left: 10px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .toc-list {
            list-style: none;
        }
        .toc-item {
            margin-bottom: 5px;
        }
        .toc-link {
            display: block;
            padding: 12px 15px;
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 14.5px;
            font-weight: 500;
            border-radius: 10px;
            transition: var(--transition);
            line-height: 1.4;
        }
        .toc-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .toc-link.active {
            background: var(--reader-accent);
            color: #0f172a;
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .back-btn:hover {
            background: #fff;
            color: #0f172a;
        }

        /* READER CONTAINER (MAIN) */
        .reader-container {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: var(--transition);
        }

        /* Topbar Controls */
        .reader-topbar {
            height: 70px;
            border-bottom: 1px solid var(--reader-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: var(--reader-pad-bg);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .active-chapter-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--reader-text);
        }
        .controls-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--reader-border);
            background: var(--reader-bg);
            color: var(--reader-text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
        }
        .control-btn:hover {
            border-color: var(--reader-accent);
            color: var(--reader-accent);
            transform: scale(1.05);
        }
        .control-btn.active {
            background: var(--reader-accent);
            color: #0f172a;
            border-color: var(--reader-accent);
        }

        /* Scrollable Reading Area */
        .reading-area {
            flex: 1;
            overflow-y: auto;
            padding: 50px 8%;
            display: flex;
            justify-content: center;
            scroll-behavior: smooth;
        }
        .reading-pad {
            max-width: 800px;
            width: 100%;
            background: var(--reader-pad-bg);
            border: 1px solid var(--reader-border);
            border-radius: 16px;
            padding: 60px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.02);
            transition: var(--transition);
            height: fit-content;
        }
        [data-theme="dark"] .reading-pad {
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        /* Book Content Typography */
        .book-content-wrapper {
            font-family: var(--reader-font-family);
            font-size: var(--reader-font-size);
            color: var(--reader-text);
            line-height: 1.85;
            transition: font-size 0.2s ease;
        }
        .book-content-wrapper h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5em;
            margin-top: 30px;
            margin-bottom: 15px;
            color: var(--reader-text);
            font-weight: 700;
            border-bottom: 2px solid var(--reader-accent);
            padding-bottom: 6px;
            display: inline-block;
        }
        .book-content-wrapper p {
            margin-bottom: 20px;
            text-align: justify;
            opacity: 0.95;
        }
        .book-content-wrapper pre {
            background: rgba(0,0,0,0.04);
            border-left: 4px solid var(--reader-accent);
            padding: 15px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14.5px;
            border-radius: 6px;
            margin: 25px 0;
            overflow-x: auto;
            color: #1a202c;
            line-height: 1.5;
        }
        body.night-mode-active .book-content-wrapper pre {
            background: rgba(255,255,255,0.03);
            color: #e2e8f0;
        }
        .book-content-wrapper ul, .book-content-wrapper ol {
            margin-left: 25px;
            margin-bottom: 20px;
            opacity: 0.95;
        }
        .book-content-wrapper li {
            margin-bottom: 8px;
        }

        /* Reader Navigation Footer */
        .reader-footer {
            height: 70px;
            border-top: 1px solid var(--reader-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: var(--reader-pad-bg);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .nav-link-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border: 1px solid var(--reader-border);
            border-radius: 8px;
            background: var(--reader-bg);
            color: var(--reader-text);
            font-weight: 600;
            font-size: 13.5px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }
        .nav-link-btn:hover {
            border-color: var(--reader-accent);
            color: var(--reader-accent);
            transform: translateY(-1px);
        }
        .nav-link-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Mobile layout styling */
        @media(max-width: 820px) {
            body {
                flex-direction: column;
            }
            .reader-sidebar {
                width: 100%;
                height: auto;
                max-height: 250px;
                border-right: none;
                border-bottom: 1px solid var(--reader-border);
            }
            .toc-list-container {
                max-height: 120px;
                padding: 10px;
            }
            .sidebar-header {
                padding: 15px;
            }
            .sidebar-footer {
                display: none;
            }
            .reader-topbar {
                padding: 0 15px;
                height: 60px;
            }
            .reading-area {
                padding: 20px 10px;
            }
            .reading-pad {
                padding: 25px 20px;
                border-radius: 10px;
            }
            .reader-footer {
                padding: 0 15px;
                height: 60px;
            }
        }
    </style>
    <!-- MathJax for rendering LaTeX math in e_reader -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>

<body>

    <!-- TOC SIDEBAR (Left) -->
    <div class="reader-sidebar" id="readerSidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                <h2>Smart Reader</h2>
            </div>
            <div class="book-details" id="sidebarBookDetails">
                <h3 id="sidebarBookTitle">Loading Book...</h3>
                <p id="sidebarBookAuthor">Please wait...</p>
            </div>
        </div>

        <div class="toc-list-container">
            <div class="toc-title">Table of Contents</div>
            <ul class="toc-list" id="tocList">
                <!-- Clickable chapters load dynamically -->
            </ul>
        </div>

        <div class="sidebar-footer" style="padding: 15px 20px; display:flex; flex-direction:column; gap:10px;">
            <button id="sidebarQuizBtn" class="back-btn" style="background:rgba(56,189,248,0.1); border-color:var(--reader-accent); color:var(--reader-accent); font-weight:700; width:100%; display:none; cursor:pointer; text-align:center; justify-content:center; padding:10px; border-radius:8px;">
                📝 Take Chapter Quiz
            </button>
            <a href="#" id="sidebarFullBookBtn" target="_blank" class="back-btn" style="background:var(--reader-accent); color:#0f172a; border-color:var(--reader-accent); display:none;">
                📖 Open Full Version
            </a>
            <a href="digital_library.html" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6"/>
                </svg>
                Library Directory
            </a>
        </div>
    </div>

    <!-- MAIN READER SPACE (Right) -->
    <div class="reader-container">
        <!-- Topbar Toolbar -->
        <div class="reader-topbar">
            <div class="active-chapter-title" id="activeChapterTitle">Loading Chapter...</div>
            
            <div class="controls-group">
                <!-- FontSize A- -->
                <button class="control-btn" id="fontDecBtn" title="Decrease Font Size">A-</button>
                <!-- FontSize A+ -->
                <button class="control-btn" id="fontIncBtn" title="Increase Font Size">A+</button>
                <!-- Bookmark this chapter -->
                <button class="control-btn" id="bookmarkBtn" title="Bookmark Chapter">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
                    </svg>
                </button>
                <!-- Reader Night Mode toggle -->
                <button class="control-btn" id="nightModeToggle" title="Toggle Reader Night Mode">🌙</button>
                <!-- Take Chapter Quiz -->
                <button class="control-btn" id="takeQuizBtn" title="Take Chapter Quiz" style="background:rgba(56,189,248,0.15); border-color:var(--reader-accent); color:var(--reader-accent); font-weight:700; display:none; padding:0 12px; cursor:pointer;">📝 Quiz</button>
                <!-- Open Full Book Topbar shortcut (mobile/tablet friendly) -->
                <a href="#" id="topbarFullBookBtn" target="_blank" class="control-btn" title="Open Complete Full Edition" style="text-decoration:none; display:none; background:var(--reader-accent); color:#0f172a; border-color:var(--reader-accent);">📖</a>
            </div>
        </div>

        <!-- Scrollable content paper pad -->
        <div class="reading-area" id="readingArea">
            <div class="reading-pad" id="readingPad">
                <div class="book-content-wrapper" id="bookContentWrapper">
                    <!-- Chapter text loads dynamically here -->
                    <p style="text-align: center; padding: 40px; color: var(--text-muted);">
                        Loading e-book content...
                    </p>
                </div>
            </div>
        </div>

        <!-- Navigation Footer -->
        <div class="reader-footer">
            <button class="nav-link-btn disabled" id="prevChapterBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6"/>
                </svg>
                Previous Chapter
            </button>
            
            <button class="nav-link-btn" id="nextChapterBtn">
                Next Chapter
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- QUIZ OVERLAY MODAL -->
    <div class="modal-overlay" id="quizModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.85); backdrop-filter:blur(8px); z-index:1000; justify-content:center; align-items:center; padding: 20px;">
        <div class="modal-content" style="background:var(--reader-pad-bg); border:1px solid var(--reader-border); color:var(--reader-text); width:100%; max-width:600px; padding:35px; border-radius:20px; box-shadow:0 25px 50px rgba(0,0,0,0.35); max-height:85vh; overflow-y:auto; position:relative;">
            <button id="closeQuizBtn" style="position:absolute; top:20px; right:20px; background:transparent; border:none; color:var(--reader-text); font-size:24px; cursor:pointer;">&times;</button>
            <h2 style="font-size:24px; font-weight:800; margin-bottom:5px; color:var(--reader-accent);">Chapter MCQ Practice</h2>
            <p style="font-size:14px; opacity:0.8; margin-bottom:25px;" id="quizSubtitle">Test your understanding of the chapter.</p>
            
            <div id="quizQuestionsContainer" style="display:flex; flex-direction:column; gap:20px;">
                <!-- Rendered dynamically -->
            </div>
            
            <div id="quizResultArea" style="display:none; margin-top:25px; padding:15px; border-radius:12px; background:rgba(16,185,129,0.1); border:1px solid #10b981; text-align:center;">
                <h3 style="color:#10b981; font-size:18px; margin-bottom:5px; font-weight:700;">Quiz Completed!</h3>
                <p style="font-weight:700; font-size:15px;" id="quizScoreText">Score: 0 / 0</p>
            </div>
            
            <button id="submitQuizBtn" style="width:100%; margin-top:25px; padding:14px; border-radius:10px; background:var(--reader-accent); color:#0f172a; border:none; font-weight:700; font-size:15px; cursor:pointer; transition:all 0.2s;">Submit Answers</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/e_reader.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Unified Header -->
    <header>
        <nav class="navbar">
            <div class="logo-section">
                <img src="images/logo.jpg" alt="logo">
                <h2>LibraryMS</h2>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="all_books.html">Books</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact-section">

        <div class="contact-box">

            <h2>Contact Us</h2>

            <form id="contactForm">

                <div class="input-group">
                    <input type="text" id="contactName" placeholder="Your Name" required>
                </div>

                <div class="input-group">
                    <input type="email" id="contactEmail" placeholder="Your Email Address" required>
                </div>

                <div class="input-group">
                    <textarea id="contactMessage" placeholder="Your Message" required></textarea>
                </div>

                <button class="contact-btn">
                    Send Message
                </button>

            </form>

        </div>

    </section>

    <!-- Main Footer -->
    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-box">
                <h2>LibraryMS</h2>
                <p>Modern digital library management system for schools and colleges.</p>
            </div>
            <div class="footer-box">
                <h3>Quick Links</h3>
                <a href="index.html">Home</a>
                <a href="all_books.html">Books</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="footer-box">
                <h3>Contact</h3>
                <p>📍 Patna, Bihar</p>
                <p>📞 +91 9876543210</p>
                <p>✉ support@libraryms.com</p>
            </div>
        </div>
        <div class="footer-bottom">
            © 2026 LibraryMS | Designed By Shikha Sharma
        </div>
    </footer>

    <script src="js/contact.js"></script>
    <script src="js/script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Management</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" style="display:flex; flex-direction:column; justify-content:space-between; height:100vh; padding: 30px 20px 20px 20px;">
        <div style="flex:1;">
            <div class="logo" style="cursor: pointer;" onclick="location.href='index.html'">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-color);">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                <h2 style="font-size:18px;">SmartLib Admin</h2>
            </div>
            <ul>
                <li><a href="dashboard.html">🏠 Dashboard</a></li>
                <li><a href="books.html">📚 Books Inventory</a></li>
                <li><a href="students.html" class="active">👨‍🎓 Student List</a></li>
                <li><a href="issue-book.html">📖 Issue Book</a></li>
                <li><a href="logout.html">🚪 Logout</a></li>
            </ul>
        </div>
        <div class="sidebar-profile" style="margin-top:auto; padding-top:20px; border-top:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:12px;">
            <div style="width:36px; height:36px; border-radius:50%; background:var(--accent-color); color:#0f172a; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;">AD</div>
            <div style="display:flex; flex-direction:column; overflow:hidden;">
                <span style="font-size:13px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Admin User</span>
                <span style="font-size:11px; color:rgba(255,255,255,0.5);">System Manager</span>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- TOPBAR -->
        <div class="topbar">
            <h1>Students Management</h1>
            <div class="profile-section">
                <button id="darkModeBtn">
                    🌙 Mode Toggle
                </button>
                <div class="profile">
                    Welcome, Admin
                </div>
            </div>
        </div>

        <!-- FORM -->
        <div class="table-section">
            <h2>Add Student</h2>
            <form id="studentForm">
                <div class="form-grid">
                    <input type="text" id="studentName" placeholder="Student Full Name" required>
                    <input type="text" id="studentCourse" placeholder="Course (e.g. BCA)" required>
                    <input type="text" id="studentRoll" placeholder="Roll Number" required>
                    <button type="submit">Add Student</button>
                </div>
            </form>
        </div>

        <!-- SEARCH -->
        <div class="table-section">
            <h2>Search Student</h2>
            <input type="text" id="studentSearchInput" placeholder="Search by name, course or roll number...">
        </div>

        <!-- STUDENT LIST -->
        <div class="table-section">
            <h2>All Registered Students</h2>
            <div id="studentList" class="book-grid">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <script src="js/students.js"></script>
</body>

</html>
